<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Clifford Number</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <p class="eyebrow">Surface-hop topology compiler</p>
      <h1>The Clifford Number</h1>
      <p class="dek">A map of how bounded legitimate surfaces carry actors, policies, companies, advisory roles, and outcomes through plausible-deniability corridors.</p>
    </header>

    <section class="search-card">
      <label for="search">Search actor, organization, or surface</label>
      <input id="search" type="search" placeholder="Ben Warner, Electric Twin, Simon Case, Faculty..." autocomplete="off">
      <div id="results" class="results"></div>
    </section>

    <section id="summary" class="summary-grid"></section>
    <section id="detail" class="detail"></section>
  </main>
  <script src="app.js" type="module"></script>
</body>
</html>
