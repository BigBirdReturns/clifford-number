<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Clifford Number</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div class="hero-text">
        <p class="eyebrow">Surface-hop topology compiler</p>
        <h1>The Clifford Number</h1>
        <p class="dek">A map of how bounded legitimate surfaces carry actors, policies, companies, advisory roles, and outcomes through plausible-deniability corridors.</p>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">Dark</button>
    </header>

    <section class="search-card">
      <label for="search">Search actor, organization, or surface</label>
      <input id="search" type="search" placeholder="Ben Warner, Electric Twin, Simon Case, Faculty..." autocomplete="off">
      <p class="try-row">Try: <span id="try-examples"></span></p>
      <div id="results" class="results"></div>
    </section>

    <section id="summary" class="summary-grid"></section>
    <section id="detail" class="detail"></section>
  </main>
  <script src="app.js" type="module"></script>
</body>
</html>
