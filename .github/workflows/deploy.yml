name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Compile, validate, scout, deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compile and validate release graph
        run: npm run check

      - name: Run scout analysis
        run: npm run scout

      - name: Build Pages artifact
        run: |
          set -euo pipefail
          echo "Repository root contents:"
          ls -la

          for f in index.html app.js styles.css graph.json cases.json; do
            if [ ! -f "$f" ]; then
              echo "::error file=$f::Required Pages file missing at repository root: $f"
              echo "If you extracted the release zip and got a nested clifford-number-main/ folder, move that folder's contents into the repository root."
              exit 1
            fi
          done

          rm -rf dist
          mkdir -p dist
          cp index.html app.js styles.css graph.json cases.json dist/

          for d in assets cases docs receipts src findings build; do
            if [ -d "$d" ]; then
              cp -R "$d" dist/
            fi
          done

          touch dist/.nojekyll

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
