name: Update sweep

on:
  schedule:
    - cron: '17 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sweep:
    name: Generate graph update sweep
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate graph and tests
        run: npm run check
      - name: Generate update sweep report
        run: npm run sweep
      - name: Upload sweep report
        uses: actions/upload-artifact@v4
        with:
          name: update-sweep-report
          path: docs/update-sweep.md
